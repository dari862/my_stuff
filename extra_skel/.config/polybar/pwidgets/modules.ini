format-padding = 1

; Available tokens:
;   %percentage% (default)
label = %percentage%%

; Only applies if <ramp> is used

ramp-0 = яЧЭ
ramp-1 = яЧЭ
ramp-2 = яЧЭ
ramp-3 = яЧЬ
ramp-4 = яЧЬ
ramp-5 = яЧЮ
ramp-6 = яЧЮ
