[module/network]
type = internal/network
interface = ${system.network_interface}

interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-foreground = ${color.purple}
format-disconnected = <label-disconnected>
format-disconnected-foreground = ${color.gray}

label-connected = "%{A1:rofi-network-manager &:}яки%{A}"
label-disconnected = "%{A1:rofi-network-manager &:}якй%{A}"

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/ethernet]
type = internal/network
interface = ${system.network_interface}

interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-foreground = ${color.purple}
format-disconnected = <label-disconnected>
format-disconnected-foreground = ${color.gray}

label-connected = "%{A1:rofi-network-manager &:}яки%{A}"
label-disconnected = "%{A1:rofi-network-manager &:}якй%{A}"

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/speed]
type = internal/network
interface = ${system.network_interface}

interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-foreground = ${color.fg}
format-connected-font = 3
format-disconnected = <label-disconnected>
format-disconnected-foreground = ${color.fg}
format-disconnected-font = 3

label-connected = "%downspeed%"
label-disconnected = NA

