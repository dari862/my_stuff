[workspace-base]
type = internal/xworkspaces

pin-workspaces = true
enable-click = true
enable-scroll = true

icon-default = "яДМ "

format = <label-state>
format-padding = 0

label-active = "яДС "
label-active-foreground = ${color.pink}
label-active-background = ${color.bg}

label-occupied = "яЖТ "
label-occupied-foreground = ${color.blue}
label-occupied-background = ${color.bg}

label-urgent = "яБк "
label-urgent-foreground = ${color.red}
label-urgent-background = ${color.bg}

label-empty = "яДМ "
label-empty-foreground = ${color.gray}
label-empty-background = ${color.bg}

[module/desktopNameWorkspace]
inherit = workspace-base

;icon-0 = desktop 1;яДМ
;icon-1 = desktop 2;яДМ
;icon-2 = desktop 3;яДМ
;icon-3 = desktop 4;яДМ
;icon-4 = desktop 5;яДМ

[module/emptyNameWorkspace]
inherit = workspace-base

;icon-0 = desktop 1;яДМ
;icon-1 = desktop 2;яДМ
;icon-2 = desktop 3;яДМ
;icon-3 = desktop 4;яДМ
;icon-4 = desktop 5;яДМ

[module/desktopWSNameWorkspace]
inherit = workspace-base

;icon-0 = desktop 1;яДМ
;icon-1 = desktop 2;яДМ
;icon-2 = desktop 3;яДМ
;icon-3 = desktop 4;яДМ
;icon-4 = desktop 5;яДМ

[module/emptyWSNameWorkspace]
inherit = workspace-base

;icon-0 = desktop 1;яДМ
;icon-1 = desktop 2;яДМ
;icon-2 = desktop 3;яДМ
;icon-3 = desktop 4;яДМ
;icon-4 = desktop 5;яДМ

