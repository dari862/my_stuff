[module/date]
type = internal/date

interval = 1.0

time = %I:%M %P
;date-alt = " %a, %d %b %y"

format = <label>
label = "%{A1:cal-popup --popup:}%time%%{A}"

######################################################

[module/filesystem]
type = internal/fs

mount-0 = /
interval = 300
fixed-values = true

format-mounted = <label-mounted>
format-mounted-prefix = ’łĆ
format-mounted-prefix-padding-right = 3pt
label-mounted = %used%

format-unmounted = <label-unmounted>
format-unmounted-prefix = ’łĆ
format-unmounted-prefix-padding-right = 3pt
label-unmounted = %mountpoint%: not mounted

######################################################

[module/network]
type = internal/network
interface = ${system.network_interface}

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = ’ć½
format-connected-prefix-padding-right = 3pt
speed-unit = ""
label-connected = "%{A1:rofi-network-manager:}%netspeed%%{A}"

format-disconnected = <label-disconnected>
format-disconnected-prefix = ’ć½
format-disconnected-prefix-padding-right = 3pt

label-disconnected = "%{A1:rofi-network-manager:}Offline%{A}"
label-disconnected-foreground = ${color.red}

######################################################

[module/ethernet]
type = internal/network
interface = ${system.network_interface}

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = ’ć½
format-connected-prefix-padding-right = 3pt
speed-unit = ""
label-connected = "%{A1:rofi-network-manager:}%netspeed%%{A}"

format-disconnected = <label-disconnected>
format-disconnected-prefix = ’ć½
format-disconnected-prefix-padding-right = 3pt

label-disconnected = "%{A1:rofi-network-manager:}Offline%{A}"
label-disconnected-foreground = ${color.red}

######################################################

[module/brightness]
type = internal/backlight
card = ${system.graphics_card}

enable-scroll = false

format = <ramp><label>
label = "%percentage%%"

ramp-0 = ’ā½
ramp-1 = ’ā½
ramp-2 = ’ā½
ramp-font = 2
ramp-padding-right = 3pt
ramp-foreground = ${color.yellow}

######################################################

[module/bna]
type = custom/text

content = " NA"
