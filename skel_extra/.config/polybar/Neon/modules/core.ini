[workspace-base]
type = internal/xworkspaces

pin-workspaces = true
inline-mode = false
enable-click = true
enable-scroll = true
reverse-scroll = true
fuzzy-match = true

format = <label-state>
format-font = 2

label-monitor = %name%

label-focused = [%name%]
label-focused-foreground = ${color.GREEN}
label-focused-background = ${color.background}
label-focused-underline = ${color.GREEN}
label-focused-padding = 0

label-occupied = %name%
label-occupied-foreground = ${color.sep-1-color}
label-occupied-background = ${color.background}
label-occupied-underline = ${color.sep-1-color}

label-occupied-padding = 0

label-urgent = %name%
label-urgent-foreground = ${color.BLUE}
label-urgent-background = ${color.background}
label-urgent-underline = ${color.BLUE}
label-urgent-padding = 0

label-empty = %name%
label-empty-foreground = ${color.WHITE}
label-empty-background = ${color.background}
label-empty-padding = 0

; Separator in between workspaces
label-separator = " ÔŚć "
label-separator-padding = 0
label-separator-foreground = ${color.ALTBLACK}
label-separator-background = ${color.background}

