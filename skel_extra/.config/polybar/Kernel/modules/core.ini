[module/date]
type = internal/date

interval = 1.0

time = %I:%M %p
time-alt = %A, %d %B %Y

format = <label>
format-prefix = " Ņ▒Č"
format-prefix-font = 3
format-prefix-foreground = #000B1E
format-prefix-background = #80E6FE

label = " %time% "
label-font = 3
label-foreground = #000B1E
label-background = #80E6FE

