[module/date]
type = internal/date

interval = 1.0

time = %I:%M %p
time-alt = %A, %d %B %Y

format = <label>
format-prefix = "ţ▒Â"
format-prefix-font = 3
format-prefix-foreground = ${color.MAGENTA}

label = " %time% "
label-font = 2
label-foreground = ${color.MAGENTA}

