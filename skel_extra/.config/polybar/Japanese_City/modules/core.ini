[module/no_bspwmMOD]
type = custom/text

content = " "
content-background = ${color.BGL}
content-foreground = #AD8EE6

[module/bspwmMOD]
type = internal/bspwm

format = <label-mode>
format-background = ${color.BGL}
format-foreground = #AD8EE6
format-padding = 1
format-font = 4

label-monocle = "Monocle"
label-tiled = "Tiled"

label-floating = " | Float"
label-pseudotiled = " | Pseudo"
label-fullscreen = " | Full"

label-locked = " | Locked"
label-sticky = " | Sticky"
label-private = " | Private"

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/date]
type = internal/date

interval = 1.0

time = %I:%M %p
time-alt = %A, %d %B %Y

format = <label>
format-prefix = "Ņ▒Č "
format-prefix-font = 3
format-prefix-foreground = ${color.CYAN2}
format-prefix-background = ${color.BGL}

label = %time%
label-font = 4
label-foreground = ${color.CYAN2}
label-background = ${color.BGL}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

; If you use both a wired and a wireless network, add both modules in config.
[module/ethernet]
type = internal/network
interface = ${system.network_interface}

interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = "Ņ¦« "
format-connected-prefix-font = 3
format-connected-prefix-foreground = ${color.CYAN}

format-disconnected = <label-disconnected>
format-disconnected-prefix = " Ņ¦░"
format-disconnected-prefix-font = 3
format-disconnected-prefix-foreground = ${color.RED}

; label-connected = "%{A1:rofi-network-manager &:}’ģĄ %downspeed% ’ģČ %upspeed% %{A}"
label-connected = "%{A1:rofi-network-manager &:}’Ģå %downspeed% ŌŚå ’Ģ× %upspeed%%{A}"

label-disconnected = "%{A1:rofi-network-manager &:} Offline %{A}"

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/netDownSpeed]
type = internal/network
interface = ${system.network_interface}

interval = 1.0
accumulate-stats = true
unknown-as-up = true

label-connected = "%{A1:rofi-network-manager &:}’Ģå %downspeed%%{A}"
; label-connected = "%{A1:rofi-network-manager &:} ’ģĄ %downspeed%  ’ģČ %upspeed% %{A}"

label-connected-background = ${color.BGL}
label-connected-foreground = #e92ef0
label-connected-font = 4

label-disconnected = "%{A1:rofi-network-manager &:} Offline %{A}"
label-disconnected-background = ${color.BGL}
label-disconnected-foreground = #e92ef0
label-disconnected-font = 4

