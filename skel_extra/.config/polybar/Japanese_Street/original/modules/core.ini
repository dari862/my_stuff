format-disconnected-prefix-font = 2
format-disconnected-foreground = ${color.FGA}

label-connected = "%{A1:rofi-network-manager &:}%essid% %{A}"
label-disconnected = "%{A1:rofi-network-manager &:} %{A}"

ramp-signal-0 = ’ć½
ramp-signal-1 = ’ć½
ramp-signal-2 = ’ć½
ramp-signal-3 = ’ć½
ramp-signal-4 = ’ć½
ramp-signal-foreground = ${color.PURPLE}
ramp-signal-font = 2

