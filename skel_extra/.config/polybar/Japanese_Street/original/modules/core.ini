[module/date]
type = internal/date

interval = 1.0

time = %I:%M %p

time-alt = %b %d, %G

format = <label>
format-prefix = "’ĆŚ "
format-prefix-font = 2
format-prefix-foreground = ${color.CYAN}
format-background = ${color.BGL}

label = %time%
label-font = 4
label-foreground = ${color.CYAN}

