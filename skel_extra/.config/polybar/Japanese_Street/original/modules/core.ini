[module/ethernet]
type = internal/network
interface = ${system.network_interface}

interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-connected-prefix = "’”ī "
format-connected-prefix-foreground = ${color.PURPLE}
format-connected-prefix-font = 2
format-connected-background = ${color.BG}
format-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-prefix = "’”Ź "
format-disconnected-prefix-font = 2
format-disconnected-foreground = ${color.FGA}
format-disconnected-background = ${color.BG}
format-disconnected-padding = 1

; label-connected = "%{A1:rofi-network-manager &:}’ģĄ %downspeed% ’ģČ %upspeed% %{A}"
label-connected = "%{A1:rofi-network-manager &:}’Ģå %downspeed% ŌŚå ’Ģ× %upspeed%%{A}"

label-disconnected = "%{A1:rofi-network-manager &:} Offline %{A}"

