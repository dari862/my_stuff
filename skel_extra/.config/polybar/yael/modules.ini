[module/date]
type = internal/date

interval = 1.0

time = "%I:%M %P ÔÄó"
format-background = ${color.blue}
format-foreground = ${color.bg}
;;date-alt = " %A, %d %B %Y"

format = <label>
format-font = 2

label = " %{A1:cal-popup --popup:}%time%%{A} "
label-font = 1

######################################################

[module/filesystem]
type = internal/fs

mount-0 = /
interval = 60
fixed-values = true

format-mounted = <label-mounted>
format-mounted-prefix = "ÔąÄ "
format-mounted-prefix-foreground = ${color.blue}
format-mounted-prefix-font = 4

format-unmounted = <label-unmounted>
format-unmounted-prefix-font = 4
format-unmounted-prefix = "ÔąÄ "
format-unmounted-prefix-foreground = ${color.blue}

label-mounted = "%used%"
label-unmounted = "%mountpoint%: not mounted"

######################################################

[module/network]
type = internal/network
interface = ${system.network_interface}

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>

speed-unit = ""
label-connected = "%{A1:rofi-network-manager:}Ôáę%{A}"
label-connected-font = 4
label-connected-foreground = ${color.blue}

format-disconnected = <label-disconnected>

label-disconnected = "%{A1:rofi-network-manager:}Offline%{A}"
label-disconnected-foreground = ${color.red}

######################################################

[module/ethernet]
type = internal/network
interface = ${system.network_interface}

interval = 3.0
accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>

speed-unit = ""
label-connected = "%{A1:rofi-network-manager:}Ôáę%{A}"
label-connected-font = 4
label-connected-foreground = ${color.blue}

format-disconnected = <label-disconnected>

label-disconnected = "%{A1:rofi-network-manager:}Offline%{A}"
label-disconnected-foreground = ${color.red}

######################################################

[module/volume]
type = internal/volume

;;sink = alsa_output.pci-0000_00_1b.0.analog-stereo
use-ui-max = true
interval = 5

format-volume = <ramp-volume> <bar-volume>
format-volume-foreground = ${color.blue}

label-volume = "%percentage%"
