# Rule-based per-window options.
#
# See WINDOW RULES section in the man page for how these work.

blur:

	{
		method = "gaussian";
		size = 10;
		deviation = 2.5;
	}

rules: (

	{
		blur-background = false;
		fade = false;
	},

	{
		match = "window_type = 'normal'";
		fade = true;	#-fade-switch
		shadow = true;	#-shadow-switch
	},

	{
		match = "window_type = 'dialog'";
		shadow = true;	#-shadow-switch
	},

	{
		match = "window_type = 'tooltip'";
		corner-radius = 0;
		opacity = 0.90;
	},

	{
		match = "window_type = 'dock'";
		corner-radius = 0;
		fade = true;
	},

	{
		match = "window_type = 'dropdown_menu' || window_type = 'menu' || window_type = 'popup' || window_type = 'popup_menu'";
		corner-radius = 0;
	},

	{
		match = "window_type = 'dock'	|| window_type = 'desktop'";
		opacity = 1.0;	#-term-opacity-switch
		blur-background = false;	#-blur-switch
	},

	{
		match = "class_g = 'Bar'			|| "	# lemonbar
				"class_g = 'slop'			|| "	# maim
				"class_g = 'Plank'			|| "
				"class_g = 'FloaTerm'		|| "
				"class_g = 'XTerm'			|| "
				"class_g = 'URxvt'			|| "
				"class_g = 'kitty'			|| "
				"class_g = 'Alacritty'		|| "
				"class_g = 'Polybar'		|| "
				"class_g = 'code-oss'		|| "
				"class_g = 'Meld'			|| "
				"class_g = 'TelegramDesktop'|| "
				"class_g = 'Joplin'			|| "
				"class_g = 'firefox-esr'	|| "
				"class_g = 'firefox'";
		opacity = 1.0;
		blur-background = false;	#-blur-switch
	},
	
	{
		match = "class_g = 'scratch' || class_g = 'Updating'";
		opacity = 0.93;
		blur-background = false;	#-blur-switch
	},
	
	{
		match = "_GTK_FRAME_EXTENTS@:c";
		opacity = 1.0;
		blur-background = false;	#-blur-switch
	},
	
	{
		match = "class_g = 'Polybar'	|| "
				"class_g = 'eww-bar'	|| "
				"class_g = 'Viewnior'	|| "
				"class_g = 'Rofi'		|| "
				"class_g = 'mpv'		|| "
				"class_g = 'scratch'	|| "
				"class_g = 'Dunst'		|| "
				"class_g = 'retroarch'";
		corner-radius = 0;
	},

	{
		match = "name = 'Notification'		|| "
				"! name~= ''         		|| "
				"name = 'tint2'   		    || "
    			"name = 'wbar'   		    || "
    			"name = 'Plank'   		    || "
    			"name = 'Docky'   		    || "
    			"name = 'Kupfer'   		    || "
    			"name *= 'VirtualBox'   	|| "
    			"name *= 'VLC'   		    || "
    			"name *= 'picom'   		    || "
    			"name *= 'Chromium'   		|| "
    			"name *= 'Chrome'   		|| "
				"class_g ?= 'Notify-osd'    || "
				"class_g ?= 'plank'         || "
    			"class_g ?= 'Conky'         || "
    			"class_g ?= 'Notify-osd'    || "
    			"class_g ?= 'Cairo-dock'    || "
    			"class_g ?= 'Xfce4-power-manager'    || "
    			"class_g ?= 'Xfce4-panel'   || "
				"class_g = 'Kupfer'         || "
    			"class_g = 'Synapse'        || "
				"class_g = 'Dunst'			|| "
				"class_g = 'Polybar'		|| "
				"class_g = 'jgmenu'			|| "
				"class_g = 'scratch'		|| "
				"class_g = 'Spotify'		|| "
				"class_g = 'retroarch'		|| "
				"class_g = 'firefox'		|| "
				"class_g = 'Rofi'			|| "
				"class_g = 'Screenkey'		|| "
				"class_g = 'mpv'			|| "
				"class_g = 'Viewnior'		|| "
				"_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'	|| ""
				"_GTK_FRAME_EXTENTS@";
		shadow = false;
	},
	
	{
		match = "name = 'jgmenu'   		    || "
    			"name = 'obmenu'   		    || "
				"class_g = 'slop'           || "
		fade = false;
	},
	
@include "picom-animations.conf"

)
